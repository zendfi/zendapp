name: zendapp
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Networking
  dio: 5.4.3+1

  # WebSocket client for pool real-time messaging
  web_socket_channel: ^2.4.0

  # Secure storage (iOS Keychain / Android Keystore)
  flutter_secure_storage: 9.2.4

  # Biometric authentication (Face ID / fingerprint) for wallet unlock
  local_auth: ^2.3.0

  # BIP-39 mnemonic derivation from wallet seed
  bip39: ^1.0.6

  # Solana keypair generation, transaction building, base58
  solana: 0.31.0+1

  # AES-256-GCM encryption + PBKDF2 key derivation
  cryptography: 2.7.0

  # Argon2id key derivation — FFI wrapper around C reference implementation
  # argon2_ffi_base: abstract API + argon2_ffi: Flutter plugin that ships the native .so
  argon2_ffi_base: ^1.1.1
  argon2_ffi: ^1.0.0

  # Google Sign-In for Drive API access (Android recovery backup)
  google_sign_in: ^6.2.1

  # Google APIs — Drive v3 scope for recovery packet storage
  googleapis: ^13.0.0

  # HTTP client used by googleapis (declared explicitly to satisfy linter)
  http: ^1.2.0

  # Hex / byte encoding for recovery packet fields
  convert: ^3.1.1

  # Audio — success sound on transfer
  audioplayers: ^6.1.0

  # Voice note recording — temporarily disabled pending AGP 8 compatible package.
  # record 4.x: missing namespace in android/build.gradle (AGP 8 incompatible).
  # record 5.x: broken record_linux platform interface.
  # Re-enable when a compatible recorder package is available.
  # record: ^4.4.4

  # Voice note playback
  just_audio: ^0.9.40

  # Microphone / audio permission requests (handled by record 4.x internally)
  # permission_handler: ^11.3.1  # removed — record 4.x calls hasPermission() natively

  # Deep link / URL launch
  url_launcher: ^6.3.1

  # QR code generation
  qr_flutter: ^4.1.0

  # Native share sheet (WhatsApp, X, Telegram, etc.)
  share_plus: ^10.1.4

  # QR/barcode scanning via camera
  mobile_scanner: ^6.0.0

  # Save images to device gallery (iOS + Android)
  gal: ^2.3.0

  # NFC tag reading and writing
  nfc_manager: ^3.3.0

  # Network image caching (profile photos)
  cached_network_image: ^3.4.1

  # Camera / gallery access (avatar upload)
  image_picker: ^1.1.2

  # Firebase — push notifications
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Local SQLite persistence via drift
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Direct SQLite access (no code generation required)
  sqflite: ^2.3.0

  # UUID generation for client-side message IDs
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  drift_dev: ^2.18.0
  build_runner: ^2.4.0

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    - assets/logo/Zend.png
    - assets/sounds/
    - assets/countries/
    - assets/countries/flags/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

  fonts:
    - family: InstrumentSerif
      fonts:
        - asset: assets/fonts/instrumentserif-regular.ttf
        - asset: assets/fonts/instrumentserif-italic.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Italic.ttf
          style: italic
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/DMSans-BoldItalic.ttf
          weight: 700
          style: italic
    - family: DMMono
      fonts:
        - asset: assets/fonts/DMMono-Light.ttf
          weight: 300
        - asset: assets/fonts/DMMono-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/DMMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMMono-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/DMMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMMono-MediumItalic.ttf
          weight: 500
          style: italic

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/Zend.png"
  web:
    generate: true
    image_path: "assets/logo/Zend.png"
