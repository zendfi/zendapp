name: Build Release APK

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Flutter Android Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 ───────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Flutter ───────────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.3"
          channel: stable
          cache: true

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── Analyze ───────────────────────────────────────────────────────────────
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      # ── Signing setup ─────────────────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/zend.jks

      - name: Write key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=zend.jks
          EOF

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      # Rename APK to include build number for clarity
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/zendapp-${{ github.run_number }}.apk

      # ── Upload artifact (all branches) ────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zendapp-${{ github.ref_name }}-build${{ github.run_number }}
          path: build/app/outputs/flutter-apk/zendapp-${{ github.run_number }}.apk
          retention-days: 30

      # ── GitHub Release (main branch only) ─────────────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ github.run_number }}
          name: "ZendApp build #${{ github.run_number }}"
          body: |
            **Automated release** from commit `${{ github.sha }}`

            Branch: `${{ github.ref_name }}`
            Built: ${{ github.event.head_commit.timestamp }}

            ### What's in this build
            ${{ github.event.head_commit.message }}

            ---
            Install on Android: download `zendapp-${{ github.run_number }}.apk` below.
          artifacts: "build/app/outputs/flutter-apk/zendapp-${{ github.run_number }}.apk"
          artifactContentType: application/vnd.android.package-archive
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Comment on PR ─────────────────────────────────────────────────────────
      - name: Comment APK link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Release APK built — build #${{ github.run_number }}**\n\n[Download from Actions](${run_url}) → Artifacts section (kept 30 days)`
            });
