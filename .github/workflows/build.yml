name: Build Release APK

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Flutter Android Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 (required by Gradle) ──────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Flutter ───────────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.3"
          channel: stable
          cache: true

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── Analyze ───────────────────────────────────────────────────────────────
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      # ── Signing setup ─────────────────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/zend.jks

      - name: Write key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/zend.jks
          EOF

      # ── Build signed release APK ──────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zendapp-${{ github.ref_name }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── Comment on PR ─────────────────────────────────────────────────────────
      - name: Comment APK link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Release APK built**\n\n[Download from Actions](${run_url}) → Artifacts section (kept 30 days)`
            });
